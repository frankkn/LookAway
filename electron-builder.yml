appId: com.lookaway.app
productName: Look Away
copyright: Copyright 2024

asar: true

directories:
  output: release

win:
  icon: build/icon.ico   # generated from build/icon.png via scripts/png-to-ico.js
  target:
    - target: nsis
      arch: x64
    - target: portable
      arch: x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

publish:
  provider: github
  owner: frankkn
  repo: LookAway

files:
  - src/main/**
  - src/shared/**
  - dist/renderer/**
  - package.json
  # Production dependencies (electron-updater) — dev deps are pruned automatically
  - node_modules/**/*
